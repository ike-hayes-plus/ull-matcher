services:
  zookeeper:
    image: zookeeper:3.9
    container_name: ull-matcher-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: ruok,stat,mntr,conf

  nacos:
    image: nacos/nacos-server:v2.4.0
    container_name: ull-matcher-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"

