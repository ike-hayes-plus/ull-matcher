global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts/ull-matcher-http-routes.yml

scrape_configs:
  - job_name: ull-matcher-node-a
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: ull-matcher-node-b
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: ull-matcher-node-c
    static_configs:
      - targets: ["host.docker.internal:8082"]
