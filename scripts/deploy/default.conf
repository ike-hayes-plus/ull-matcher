# shellcheck shell=bash
#
# Baseline deploy defaults. Cluster-specific files should override only the
# values that differ for that shard or environment.

SERVER_MODE_VALUE="${SERVER_MODE_VALUE:-PROD}"
CLUSTER_NAME="${CLUSTER_NAME:-merchant-prod}"
SHARD_KEY="${SHARD_KEY:-merchant:42}"
SYMBOL_ID="${SYMBOL_ID:-1}"

ZK_CONNECT="${ZK_CONNECT:-127.0.0.1:2181,127.0.0.1:2182,127.0.0.1:2183}"
ETCD_ENDPOINT="${ETCD_ENDPOINT:-http://127.0.0.1:2379,http://127.0.0.1:2381,http://127.0.0.1:2383}"
LEASE_PROVIDER="${LEASE_PROVIDER:-zk}"
DISCOVERY_PROVIDER="${DISCOVERY_PROVIDER:-zk}"

REPLICATION_TRANSPORT="${REPLICATION_TRANSPORT:-GRPC}"
REPLICATION_MODE="${REPLICATION_MODE:-WAIT_FOR_ANY_STANDBY}"
WAL_DURABILITY_MODE="${WAL_DURABILITY_MODE:-SYNC_PER_COMMAND}"
WAL_FORCE_BATCH_SIZE="${WAL_FORCE_BATCH_SIZE:-}"
WAL_FORCE_MAX_DELAY_MICROS="${WAL_FORCE_MAX_DELAY_MICROS:-}"
TRANSPORT_CHANGE_WINDOW_ID="${TRANSPORT_CHANGE_WINDOW_ID:-}"
ALLOW_TRANSPORT_CHANGE="${ALLOW_TRANSPORT_CHANGE:-false}"

HTTP_BIND_HOST="${HTTP_BIND_HOST:-127.0.0.1}"
GRPC_BIND_HOST="${GRPC_BIND_HOST:-0.0.0.0}"
BINARY_BIND_HOST="${BINARY_BIND_HOST:-0.0.0.0}"
ADVERTISED_HOST="${ADVERTISED_HOST:-127.0.0.1}"
ALLOW_INSECURE_REMOTE_HTTP="${ALLOW_INSECURE_REMOTE_HTTP:-false}"
ALLOW_DUAL_REMOTE_INGRESS="${ALLOW_DUAL_REMOTE_INGRESS:-false}"

HTTP_PORT="${HTTP_PORT:-8080}"
GRPC_PORT="${GRPC_PORT:-9190}"
AERON_PORT="${AERON_PORT:-15090}"
BINARY_PORT="${BINARY_PORT:-10080}"

FAILOVER_MIN_STANDBY_REPLICAS="${FAILOVER_MIN_STANDBY_REPLICAS:-1}"
FAILOVER_PRIMARY_HEARTBEAT_TIMEOUT_MILLIS="${FAILOVER_PRIMARY_HEARTBEAT_TIMEOUT_MILLIS:-}"
FAILOVER_MAX_PROMOTION_LAG="${FAILOVER_MAX_PROMOTION_LAG:-}"
DEPLOY_HEALTH_TIMEOUT_SECONDS="${DEPLOY_HEALTH_TIMEOUT_SECONDS:-60}"
DEPLOY_STABLE_ROUNDS="${DEPLOY_STABLE_ROUNDS:-3}"
DEPLOY_POLL_INTERVAL_SECONDS="${DEPLOY_POLL_INTERVAL_SECONDS:-1}"

ENABLE_TRANSPORT_TLS="${ENABLE_TRANSPORT_TLS:-false}"
TRANSPORT_TLS_RELOAD_MILLIS="${TRANSPORT_TLS_RELOAD_MILLIS:-250}"

DATA_ROOT="${DATA_ROOT:-$ROOT_DIR/var/data}"
LOG_ROOT="${LOG_ROOT:-$ROOT_DIR/var/log}"
CP_FILE="${CP_FILE:-$ROOT_DIR/var/run/classpath.txt}"
TRANSPORT_TLS_DIR="${TRANSPORT_TLS_DIR:-$ROOT_DIR/var/tls}"
CP_BUILD_MAVEN_ARGS="${CP_BUILD_MAVEN_ARGS:- --batch-mode --no-transfer-progress -q -pl matcher-server -am -DskipTests package dependency:build-classpath}"

REMOTE_ROOT="${REMOTE_ROOT:-$ROOT_DIR}"
REMOTE_USER="${REMOTE_USER:-}"
SSH_OPTS="${SSH_OPTS:--o BatchMode=yes -o StrictHostKeyChecking=accept-new}"
