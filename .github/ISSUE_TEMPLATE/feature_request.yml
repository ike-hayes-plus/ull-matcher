name: Feature request
description: Propose a new capability or architectural improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What production or developer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Scope and boundaries
      description: Clarify affected modules, APIs, persistence formats, and operational impact.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe rejected options or tradeoffs.
