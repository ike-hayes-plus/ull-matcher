name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven wrapper availability
        run: mvn -version

      - name: Run style and prerequisite validation
        run: mvn --batch-mode --no-transfer-progress -Pstyle-check validate

      - name: Run benchmark tooling self-tests
        run: |
          ./scripts/ops/test-python-scripts.sh
          ./scripts/ops/test-deploy-cluster.sh
          ./scripts/ops/test-benchmark-replication-metrics.sh
          ./scripts/ops/test-archive-current-benchmarks.sh
          ./scripts/ops/test-validate-benchmark-baseline.sh

      - name: Run unit and integration tests
        run: mvn --batch-mode --no-transfer-progress test

      - name: Enforce core runtime coverage
        run: mvn --batch-mode --no-transfer-progress -pl matcher-core,matcher-runtime -am verify

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore

  ha-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Start HA lab infrastructure
        run: ./scripts/run-chaos-tests.sh lab up

      - name: Start three-node cluster
        run: ./scripts/run-chaos-tests.sh cluster up

      - name: Validate transport rollout baseline
        run: ./scripts/run-chaos-tests.sh cluster validate

      - name: Run failover smoke
        run: ./scripts/run-chaos-tests.sh cluster failover-smoke

      - name: Stop cluster and lab
        if: always()
        run: |
          ./scripts/run-chaos-tests.sh cluster down || true
          ./scripts/run-chaos-tests.sh lab down || true

      - name: Upload HA smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ha-smoke-artifacts
          path: |
            target/chaos-lab/**
            target/failover-smoke/**
            target/lab-logs/**
            target/transport-compare/**
          if-no-files-found: ignore

  transport-compare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ha-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Start HA lab infrastructure
        run: ./scripts/run-chaos-tests.sh lab up

      - name: Run transport comparison
        run: ./scripts/run-chaos-tests.sh cluster transport-compare

      - name: Stop cluster and lab
        if: always()
        run: |
          ./scripts/run-chaos-tests.sh cluster down || true
          ./scripts/run-chaos-tests.sh lab down || true

      - name: Upload transport comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transport-compare-artifacts
          path: |
            target/transport-compare/**
            target/lab-logs/**
          if-no-files-found: ignore
