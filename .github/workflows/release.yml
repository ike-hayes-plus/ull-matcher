name: Release

on:
  push:
    tags:
      - 'dry-run-*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.1.0
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      publish_github_packages:
        description: Publish Maven artifacts to GitHub Packages
        required: true
        default: false
        type: boolean
      publish_maven_central:
        description: Publish signed Maven artifacts to Maven Central
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${EVENT_NAME}" = "push" ]; then
            echo "release_tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git identity
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        env:
          TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          git rev-parse "${TAG}" >/dev/null 2>&1 && {
            echo "Tag ${TAG} already exists"
            exit 1
          }
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and verify release artifacts
        run: mvn --batch-mode --no-transfer-progress -Pstyle-check test package

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find . -path "*/target/*.jar" \
            ! -name "original-*.jar" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Upload dry-run artifacts
        if: ${{ steps.meta.outputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-${{ steps.meta.outputs.release_tag }}
          path: release-artifacts/*

      - name: Publish GitHub release
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || steps.meta.outputs.release_tag }}
          generate_release_notes: true
          files: release-artifacts/*

  publish-github-packages:
    if: ${{ needs.release.outputs.dry_run != 'true' && inputs.publish_github_packages }}
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 21 for GitHub Packages
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn --batch-mode --no-transfer-progress deploy
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/ike-hayes-plus/ull-matcher

  publish-maven-central:
    if: ${{ needs.release.outputs.dry_run != 'true' && inputs.publish_maven_central }}
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 21 for Maven Central
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: >
          mvn --batch-mode --no-transfer-progress
          -Pstyle-check,release-signing,central-publish deploy
